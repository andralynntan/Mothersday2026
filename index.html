<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital@0;1&family=Dancing+Script:wght@500;700&display=swap');

  :root {
    --blush: #f7d6d0;
    --rose: #e8a4a0;
    --sage: #8fa87a;
    --cream: #faf7f0;
    --dusty-pink: #d4888a;
    --sunflower: #e8b84b;
    --periwinkle: #a8c4d8;
    --text: #4a3f3f;
    --text-light: #7a6a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', serif;
    background-color: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .flowers-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }

  /* ── Screen 1 ── */
  #screen-name {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    position: relative; z-index: 1;
  }

  .title-block {
    text-align: center; margin-bottom: 2.2rem;
    animation: fadeUp 1s ease both;
  }
  .title-block .eyebrow {
    font-family: 'Dancing Script', cursive;
    font-size: 1.25rem; color: var(--dusty-pink);
    letter-spacing: 0.05em; margin-bottom: 0.5rem;
  }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem,6vw,3.6rem);
    font-weight: 400; color: var(--text); line-height: 1.15;
  }
  .title-block h1 em { color: var(--dusty-pink); font-style: italic; }

  .name-card {
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(232,164,160,0.35);
    border-radius: 24px; padding: 2.5rem 3rem;
    max-width: 460px; width: 100%; text-align: center;
    box-shadow: 0 8px 40px rgba(212,136,138,0.12);
    animation: fadeUp 1.1s 0.2s ease both;
  }
  .name-card label {
    display: block; font-family: 'Dancing Script', cursive;
    font-size: 1.5rem; color: var(--dusty-pink); margin-bottom: 1rem;
  }
  .name-card input {
    width: 100%; border: none;
    border-bottom: 2px solid var(--rose);
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; text-align: center;
    color: var(--text); padding: 0.4rem 0;
    outline: none; transition: border-color 0.3s;
  }
  .name-card input::placeholder { color: #cbb9b9; }
  .name-card input:focus { border-color: var(--dusty-pink); }

  .open-btn {
    margin-top: 2rem; display: inline-block;
    background: linear-gradient(135deg, var(--rose), var(--dusty-pink));
    color: white; font-family: 'Dancing Script', cursive;
    font-size: 1.4rem; border: none; border-radius: 50px;
    padding: 0.75rem 2.8rem; cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,136,138,0.35);
    transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 0.02em;
  }
  .open-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(212,136,138,0.45); }

  /* ── Screen 1b ── */
  #screen-relation {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    position: relative; z-index: 1;
  }
  #screen-relation.visible { display: flex; }

  .relation-card {
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(232,164,160,0.35);
    border-radius: 24px; padding: 2.5rem 3rem;
    max-width: 560px; width: 100%; text-align: center;
    box-shadow: 0 8px 40px rgba(212,136,138,0.12);
    animation: fadeUp 0.7s ease both;
  }
  .relation-card h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 400; font-size: 1.65rem; color: var(--text); margin-bottom: 0.4rem;
  }
  .relation-card h2 em { color: var(--dusty-pink); font-style: italic; }
  .relation-card .sub {
    font-family: 'Lora', serif; font-style: italic;
    color: var(--text-light); font-size: 0.95rem; margin-bottom: 1.8rem;
  }

  .relation-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.85rem; margin-bottom: 1.5rem;
  }
  .rel-btn {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(212,136,138,0.28);
    border-radius: 16px; padding: 1.2rem 0.8rem;
    cursor: pointer; transition: all 0.22s; text-align: center;
  }
  .rel-btn:hover {
    border-color: var(--dusty-pink);
    background: rgba(247,214,208,0.3);
    transform: translateY(-2px);
    box-shadow: 0 4px 18px rgba(212,136,138,0.18);
  }
  .rel-btn.selected {
    border-color: var(--dusty-pink);
    background: linear-gradient(135deg,rgba(247,214,208,0.5),rgba(212,197,232,0.28));
    box-shadow: 0 4px 20px rgba(212,136,138,0.22);
  }
  .rel-btn .rel-icon { display: block; margin: 0 auto 0.5rem; }
  .rel-btn .rel-name {
    font-family: 'Playfair Display', serif; font-size: 1.05rem;
    font-weight: 600; display: block; margin-bottom: 0.2rem; color: var(--text);
  }
  .rel-btn.selected .rel-name { color: var(--dusty-pink); }
  .rel-btn .rel-desc {
    font-size: 0.78rem; font-style: italic;
    color: var(--text-light); display: block; line-height: 1.4;
    font-family: 'Lora', serif;
  }
  .back-link {
    background: none; border: none;
    font-family: 'Lora', serif; font-style: italic;
    color: var(--text-light); font-size: 0.9rem;
    cursor: pointer; text-decoration: underline;
    margin-top: 0.5rem; display: block;
  }
  .back-link:hover { color: var(--dusty-pink); }

  /* ── Screen 2 ── */
  #screen-letter {
    display: none; min-height: 100vh; padding: 3rem 1.5rem;
    position: relative; z-index: 1;
    align-items: center; justify-content: center; flex-direction: column;
  }
  #screen-letter.visible { display: flex; }

  .letter-wrap { max-width: 680px; width: 100%; }

  .letter-paper {
    background: rgba(255,253,248,0.93);
    border: 1.5px solid rgba(232,164,160,0.28); border-radius: 4px;
    padding: 3.5rem 4rem;
    box-shadow: 0 2px 0 rgba(200,180,180,0.15), 0 12px 60px rgba(180,140,140,0.14), inset 0 0 80px rgba(245,230,200,0.1);
    position: relative; animation: paperReveal 0.8s ease both;
    background-image: repeating-linear-gradient(transparent,transparent 31px,rgba(232,200,200,0.16) 31px,rgba(232,200,200,0.16) 32px);
    background-position: 0 58px; line-height: 32px;
  }
  .letter-paper::before {
    content: ''; position: absolute;
    left: 72px; top: 0; bottom: 0;
    border-left: 1.5px solid rgba(212,136,138,0.15);
  }
  .letter-date {
    font-family: 'Dancing Script', cursive; font-size: 1rem;
    color: var(--text-light); text-align: right; margin-bottom: 1.5rem;
    display: block; opacity: 0; transition: opacity 0.6s;
  }
  .letter-salutation {
    font-family: 'Playfair Display', serif; font-size: 1.55rem;
    font-style: italic; color: var(--dusty-pink); margin-bottom: 1.2rem;
    opacity: 0; transition: opacity 0.6s 0.4s;
  }
  .letter-body {
    font-family: 'Lora', serif; font-size: 1.05rem;
    line-height: 2rem; color: var(--text); white-space: pre-wrap; min-height: 200px;
  }
  .letter-sign {
    margin-top: 2rem; text-align: right;
    font-family: 'Dancing Script', cursive; font-size: 1.4rem;
    color: var(--dusty-pink); opacity: 0; transition: opacity 1s;
  }
  .cursor {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--dusty-pink); vertical-align: middle;
    animation: blink 0.75s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .bouquet-top {
    display: flex; justify-content: center;
    margin-bottom: -10px; position: relative; z-index: 2;
  }
  .bouquet-top svg {
    filter: drop-shadow(0 4px 16px rgba(212,136,138,0.2));
    animation: floatBouquet 4s ease-in-out infinite;
  }
  @keyframes floatBouquet { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .petal {
    position: fixed; top: -40px;
    animation: petalFall linear infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes petalFall {
    0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.7}
    100%{transform:translateY(110vh) rotate(360deg) translateX(50px);opacity:0}
  }

  .restart-btn {
    margin-top: 1.5rem; background: transparent;
    border: 1.5px solid var(--rose); color: var(--dusty-pink);
    font-family: 'Dancing Script', cursive; font-size: 1.1rem;
    padding: 0.5rem 1.8rem; border-radius: 50px; cursor: pointer; transition: background 0.2s;
  }
  .restart-btn:hover { background: rgba(232,164,160,0.15); }

  .download-btn {
    margin-top: 0.8rem; background: transparent;
    border: 1.5px solid var(--sage); color: var(--sage);
    font-family: 'Dancing Script', cursive; font-size: 1.1rem;
    padding: 0.5rem 1.8rem; border-radius: 50px; cursor: pointer;
    transition: background 0.2s, color 0.2s; display: flex;
    align-items: center; gap: 0.4rem;
  }
  .download-btn:hover { background: rgba(143,168,122,0.12); }
  .download-btn.loading { opacity: 0.6; pointer-events: none; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes paperReveal { from{opacity:0;transform:scale(0.97) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }

  @media(max-width:600px){
    .letter-paper{padding:2.5rem 1.8rem}
    .letter-paper::before{display:none}
    .relation-card,.name-card{padding:2rem 1.5rem}
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const letterBank = {
  family: [
    `There is a particular kind of love that only family knows — the kind that doesn't need explaining, that exists before words and carries on long after they run out. You have always embodied that love for me.

  ],

  colleague: [
    `There's something particular about the people you work alongside — you spend more waking hours with them than almost anyone, and the ones who do it with warmth and humanity make every day genuinely better.

let currentName = '';
let selectedRelation = null;

function pickLetter(name, relation) {
  const pool = letterBank[relation];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) & 0xffffffff;
  return pool[Math.abs(hash) % pool.length];
}

function goToRelation() {
  const raw = document.getElementById('nameInput').value.trim();
  if (!raw) { document.getElementById('nameInput').focus(); return; }
  currentName = raw.charAt(0).toUpperCase() + raw.slice(1);
  selectedRelation = null;
  document.querySelectorAll('.rel-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('revealBtn');
  btn.style.opacity = '0.42'; btn.style.pointerEvents = 'none';
  document.getElementById('screen-name').style.display = 'none';
  document.getElementById('screen-relation').classList.add('visible');
}

function selectRelation(rel) {
  selectedRelation = rel;
  document.querySelectorAll('.rel-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('rel-' + rel).classList.add('selected');
  const btn = document.getElementById('revealBtn');
  btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
}

function goBack() {
  document.getElementById('screen-relation').classList.remove('visible');
  document.getElementById('screen-name').style.display = 'flex';
}

let typeInterval = null;
function typewrite(el, text, speed, onDone) {
  let i = 0;
  el.innerHTML = '<span class="cursor"></span>';
  typeInterval = setInterval(() => {
    el.innerHTML = text.slice(0, i).replace(/\n/g,'<br>') + '<span class="cursor"></span>';
    i++;
    if (i > text.length) {
      clearInterval(typeInterval);
      el.innerHTML = text.replace(/\n/g,'<br>');
      if (onDone) onDone();
    }
  }, speed);
}

function spawnPetals() {
  const container = document.getElementById('petals');
  const shapes = ['🌸','🌼','🌷','✿','🌺'];
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.8 + Math.random() * 0.9) + 'rem';
    p.style.animationDuration = (7 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 7) + 's';
    p.style.opacity = 0.5 + Math.random() * 0.4;
    container.appendChild(p);
  }
}

// ── Admin dashboard ────────────────────────────
const IS_ADMIN = new URLSearchParams(window.location.search).has('admin');

function showAdminDashboard() {
  document.getElementById('screen-name').style.display = 'none';
  const dash = document.createElement('div');
  dash.id = 'screen-admin';
  dash.style.cssText = `
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:2rem; position:relative; z-index:1;
  `;
  dash.innerHTML = `
    <div style="
      background:rgba(255,255,255,0.82); backdrop-filter:blur(10px);
      border:1.5px solid rgba(232,164,160,0.35); border-radius:24px;
      padding:2.5rem 3rem; max-width:560px; width:100%; text-align:center;
      box-shadow:0 8px 40px rgba(212,136,138,0.12);
    ">
      <div style="font-family:'Dancing Script',cursive; font-size:1.2rem; color:#d4888a; margin-bottom:0.4rem;">Your secret garden 🌿</div>
      <h2 style="font-family:'Playfair Display',serif; font-weight:400; font-size:1.8rem; color:#4a3f3f; margin-bottom:0.6rem;">Letter Dashboard</h2>
      <p style="font-family:'Lora',serif; font-style:italic; color:#7a6a6a; font-size:0.95rem; margin-bottom:2rem;">
        Every time someone opens their letter, it's logged here automatically.
      </p>
      <p style="font-family:'Lora',serif; font-style:italic; color:#b8a8a8; font-size:0.82rem; margin-top:-1rem; margin-bottom:0.5rem;">
        Visitors are logged live as they open their letters.
      </p>
      <div id="admin-log" style="
        margin-top:2rem; text-align:left;
        font-family:'Lora',serif; font-size:0.9rem; color:#7a6a6a;
        max-height:300px; overflow-y:auto;
        border-top:1px solid rgba(212,136,138,0.2); padding-top:1rem;
      ">
        <em>Loading recent visitors…</em>
      </div>
    </div>
  `;
  document.body.appendChild(dash);
  loadRecentVisitors();
}

async function loadRecentVisitors() {
  const logEl = document.getElementById('admin-log');
  if (!logEl) return;
  try {
    const res = await fetch(GH_API, {
      headers: { 'Authorization': 'Bearer ' + GH_TOKEN, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) { logEl.innerHTML = '<em>No visitors yet — share your link! 🌷</em>'; return; }
    const data = await res.json();
    const visitors = JSON.parse(atob(data.content.replace(/\n/g, '')));
    if (!visitors.length) { logEl.innerHTML = '<em>No visitors yet — share your link! 🌷</em>'; return; }
    const relEmoji = { Family:'🌷', Friend:'🌸', Mentor:'🌿', Colleague:'🌼' };
    logEl.innerHTML = visitors.map(v => `
      <div style="padding:0.5rem 0; border-bottom:1px solid rgba(212,136,138,0.12);">
        ${relEmoji[v.relationship] || '💌'} <strong>${v.name}</strong> &mdash; ${v.relationship} &mdash; Variation ${v.variation}<br>
        <span style="font-size:0.8rem; color:#b8a8a8;">${v.datetime}</span>
      </div>`).join('');
  } catch(e) {
    logEl.innerHTML = '<em>No visitors yet — share your link! 🌷</em>';
  }
}

// ── GitHub-based visitor logging ───────────────
const GH_TOKEN = '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';
const GH_REPO  = 'andralynntan/Mothersday2026';
const GH_FILE  = 'visitors.json';
const GH_API   = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

async function logVisitor(name, relation, variationIndex) {
  const relLabel = { family:'Family', friend:'Friend', mentor:'Mentor', colleague:'Colleague' }[relation] || relation;
  const now = new Date().toLocaleString('en-GB', { dateStyle:'medium', timeStyle:'short' });
  const entry = { name, relationship: relLabel, variation: variationIndex + 1, datetime: now };
  try {
    let visitors = [];
    let sha = null;
    const getRes = await fetch(GH_API, {
      headers: { 'Authorization': 'Bearer ' + GH_TOKEN, 'Accept': 'application/vnd.github+json' }
    });
    if (getRes.ok) {
      const getData = await getRes.json();
      sha = getData.sha;
      visitors = JSON.parse(atob(getData.content.replace(/\n/g, '')));
    }
    visitors.unshift(entry);
    await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + GH_TOKEN,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Add visitor: ${name}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(visitors, null, 2)))),
        ...(sha ? { sha } : {})
      })
    });
  } catch(e) { /* silent */ }
}

function openLetter() {
  if (!selectedRelation || !currentName) return;
  document.getElementById('screen-relation').classList.remove('visible');
  document.getElementById('screen-letter').classList.add('visible');

  const dateEl = document.getElementById('letterDate');
  dateEl.textContent = new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
  setTimeout(() => dateEl.style.opacity = 1, 100);

  const salEl = document.getElementById('letterSalutation');
  salEl.textContent = `Dearest ${currentName},`;
  setTimeout(() => salEl.style.opacity = 1, 500);

  const pool = letterBank[selectedRelation];
  let hash = 0;
  for (let i = 0; i < currentName.length; i++) hash = (hash * 31 + currentName.charCodeAt(i)) & 0xffffffff;
  const variationIndex = Math.abs(hash) % pool.length;

  const bodyEl = document.getElementById('letterBody');
  const text = pool[variationIndex];
  setTimeout(() => typewrite(bodyEl, '\n' + text, 22, () => {
    document.getElementById('letterSign').style.opacity = 1;
  }), 1000);

  spawnPetals();
  logVisitor(currentName, selectedRelation, variationIndex);
}

// ── Download as PNG ────────────────────────────
async function downloadLetter() {
  const btn = document.getElementById('downloadBtn');
  btn.classList.add('loading');
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6" stroke-dasharray="28" stroke-dashoffset="10"><animateTransform attributeName="transform" type="rotate" from="0 8 8" to="360 8 8" dur="0.8s" repeatCount="indefinite"/></circle></svg> Saving…`;

  // Build a self-contained card to screenshot
  const name = currentName;
  const date = document.getElementById('letterDate').textContent;
  const body = document.getElementById('letterBody').innerHTML;

  const card = document.createElement('div');
  card.style.cssText = `
    position: fixed; left: -9999px; top: 0;
    width: 720px; padding: 60px 72px 72px;
    background: #fdf9f2;
    background-image: repeating-linear-gradient(transparent,transparent 31px,rgba(232,200,200,0.18) 31px,rgba(232,200,200,0.18) 32px);
    background-position: 0 90px;
    font-family: Georgia, serif; line-height: 32px;
    box-sizing: border-box;
  `;

  card.innerHTML = `
    <div style="border-left: 2px solid rgba(212,136,138,0.18); padding-left: 32px;">
      <div style="font-family: 'Dancing Script', cursive, Georgia; font-size: 15px; color: #7a6a6a; text-align: right; margin-bottom: 24px;">${date}</div>
      <div style="font-size: 26px; font-style: italic; color: #d4888a; margin-bottom: 20px; font-family: Georgia, serif;">Dearest ${name},</div>
      <div style="font-size: 16px; color: #4a3f3f; line-height: 32px; font-family: Georgia, serif;">${body}</div>
      <div style="margin-top: 32px; text-align: right; font-size: 22px; color: #d4888a; font-family: Georgia, serif; font-style: italic;">
        With all my love 🌷<br>Andra
      </div>
    </div>
    <div style="margin-top: 28px; text-align: center; font-size: 12px; color: #b8a8a8; font-style: italic; font-family: Georgia, serif; letter-spacing: 0.05em;">
      with love and all my heart, Andra 🌸
    </div>
  `;

  document.body.appendChild(card);

  try {
    const canvas = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#fdf9f2',
      width: 720,
      windowWidth: 720
    });

    const link = document.createElement('a');
    link.download = `letter-for-${name.toLowerCase()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    console.error(e);
  }

  document.body.removeChild(card);
  btn.classList.remove('loading');
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2v8M5 7l3 3 3-3M2 12h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Save as image`;
}

function restart() {
  clearInterval(typeInterval);
  document.getElementById('petals').innerHTML = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('letterDate').style.opacity = 0;
  document.getElementById('letterSalutation').style.opacity = 0;
  document.getElementById('letterSign').style.opacity = 0;
  document.getElementById('letterBody').innerHTML = '<span class="cursor"></span>';
  document.getElementById('screen-letter').classList.remove('visible');
  document.getElementById('screen-name').style.display = 'flex';
  currentName = ''; selectedRelation = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('screen-name').style.display !== 'none') goToRelation();
});

// Init admin last, after all functions are defined
if (IS_ADMIN) showAdminDashboard();
</script>
